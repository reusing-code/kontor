version: "3"

tasks:
  ci:
    desc: Run the same local checks expected by CI
    deps:
      - ci:backend
      - ci:frontend

  ci:backend:
    desc: Run backend test and lint checks
    dir: backend
    cmds:
      - task test
      - task lint

  ci:frontend:
    desc: Run frontend lint and build checks
    dir: frontend
    cmds:
      - bun run lint
      - bun run build

  dev:
    desc: Run backend and frontend concurrently
    deps:
      - dev:backend
      - dev:frontend

  dev:backend:
    desc: Run backend with Air
    dir: backend
    cmds:
      - task dev

  dev:frontend:
    desc: Run frontend dev server
    dir: frontend
    cmds:
      - bun run dev

  build:
    desc: Build Docker image
    cmds:
      - docker build -t kontor .

  up:
    desc: Start with docker compose
    cmds:
      - docker compose up -d

  down:
    desc: Stop docker compose
    cmds:
      - docker compose down
